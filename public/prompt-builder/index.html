<style>

    --bg:#ede6f2;

    --glass:rgba(255,255,255,0.48);

    --border-2:rgba(106,90,138,0.28);
    --text:#2a2438;

    --muted:#7a6a9a;
    --dim:#9988aa;
    --accent:#8a6aaa;
    --accent-soft:rgba(138,106,170,0.10);
    --accent-2:#5a8a9a;
    --gold:#b89a5a;
    --radius:14px;
    --radius-sm:10px;
    --radius-xs:7px;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif:'Fraunces', Georgia, serif;
    --sans:'Josefin Sans', ui-sans-serif, system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  ::selection{background:rgba(138,106,170,0.25)}
  #root{min-height:100vh}
